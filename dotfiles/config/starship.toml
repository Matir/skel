"$schema" = 'https://starship.rs/config-schema.json'

[directory]
fish_style_pwd_dir_length = 1
truncate_to_repo = false

[gcloud]
symbol = "️🇬️ "
format = "on [$symbol$project]($style) "
detect_env_vars = ["STARSHIP_SHOW_GCLOUD"]

[status]
disabled = false
symbol = "⛌"

[username]
show_always = true

[ruby]
detect_variables = []

[shell]
fish_indicator = '🐟 '
zsh_indicator = ''
bash_indicator = ''
powershell_indicator = '_'
unknown_indicator = '??'
style = 'cyan bold'
disabled = false
format = '[$indicator]($style)'

[pulumi]
disabled = true

[docker_context]
# really long paths when DOCKER_HOST is set
disabled = true

[kubernetes]
disabled = false
detect_folders = ["k8s"]

[custom.gemini_context]
description = "Displays the current Gemini CLI context"
when = "test -n \"$GEMINI_CLI_HOME\""
command = """
context_dir=\"${XDG_CONFIG_HOME:-$HOME/.config}/gemini\"
if [[ \"$GEMINI_CLI_HOME\" == $context_dir/* ]]; then
  basename \"$GEMINI_CLI_HOME\"
fi
"""
style = "bold blue"
format = "♊[$output](blue) "
